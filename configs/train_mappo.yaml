defaults:
  env_config: configs/env_2d.yaml
scenario: ScenarioA
training:
  seed: 42
  total_steps: 100000
  rollout_length: 256
  gamma: 0.99
  gae_lambda: 0.95
  clip_ratio: 0.2
  entropy_coef: 0.01
  value_coef: 0.5
  learning_rate: 0.0003
  batch_size: 1024
  epochs: 4
  max_grad_norm: 0.5
  value_clip: 0.2
  reward_normalization: true
  observation_normalization: true
  lr_schedule: true
model:
  hidden_dim: 128
  activation: tanh
logging:
  log_dir: experiments/results/mappo
