scenario: Scenario5v5
algorithm: IPG-MAPPO
training:
  seed: 1
  total_env_steps: 5000000
  total_steps: 5000000
  rollout_steps: 512
  rollout_length: 512
  num_envs: 8
  gamma: 0.99
  gae_lambda: 0.95
  clip_param: 0.2
  clip_ratio: 0.2
  entropy_coef_start: 0.01
  entropy_coef_end: 0.0025
  entropy_coef: 0.01
  value_loss_coef: 0.5
  value_coef: 0.5
  learning_rate: 0.0003
  min_learning_rate: 0.00003
  mini_batch_size: 2048
  batch_size: 2048
  ppo_epoch: 5
  epochs: 5
  max_grad_norm: 0.5
  value_clip: 0.2
  reward_normalization: true
  observation_normalization: true
  use_linear_lr_decay: true
  lr_schedule: true
model:
  hidden_dim: 128
  graph_hidden_dim: 128
  num_graph_layers: 2
  attention_heads: 4
method:
  use_dense_reward: true
  use_predictive_reward: true
  use_soft_assignment: false
  use_graph_encoder: true
  graph_type: ipg
  use_interception_point_nodes: true
  use_ita_edge_feature: true
  use_assignment_gate: false
  use_assignment_auxiliary_loss: false
ipga:
  prediction_horizon: 5.0
  graph_type: ipg
  use_graph: true
  use_interception_point_nodes: true
  use_ita_features: true
  use_assignment_gate: false
  use_assignment_loss: false
  assignment_loss_start: 0.0
  assignment_loss_end: 0.0
  assignment_loss_decay_steps: 1000000
logging:
  log_dir: experiments/results/final_5v5/ipg_mappo
env:
  name: counter_uav_2d
  seed: 1
  world_size: 1000.0
  num_defenders: 5
  num_intruders: 5
  max_steps: 500
  protected_asset_position: [500.0, 500.0]
  protected_radius: 80.0
  intercept_radius: 20.0
  defender_max_speed: 12.0
  intruder_max_speed: 8.0
  dt: 1.0
  nearest_intruders: 4
  nearest_teammates: 3
  communication_radius: 250.0
  collision_radius: 5.0
  separation_radius: 25.0
  prediction_horizon_mode: fixed
  prediction_horizon: 5.0
  blocking_sigma: 35.0
  assignment_guidance_sigma: 120.0
  assignment_weight_start: 0.0
  assignment_weight_end: 0.0
  assignment_decay_steps: 1000000
  assignment_update_interval: 10
  defender_acceleration_scale: 4.0
  intruder_behavior: straight_attack
  initial_energy: 100.0
  energy_cost: 0.05
  reward:
    intercept: 50.0
    high_threat_intercept: 20.0
    approach: 0.02
    intercept_point_approach: 0.15
    blocking_position: 0.20
    ttc_advantage: 0.10
    intruder_progress_penalty: 0.05
    breach: -40.0
    collision: -5.0
    collision_avoidance: 0.03
    energy: 0.02
    action_magnitude_penalty: 0.02
    step: -0.005
    duplicate_assignment: 0.0
    assignment_guidance: 0.0
    early_intercept_weight: 0.0
    intercept_time_margin_weight: 0.0
    threat_scale: 0.05
