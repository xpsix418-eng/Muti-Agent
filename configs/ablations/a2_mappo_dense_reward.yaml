scenario: Scenario5v5
training:
  seed: 42
  total_steps: 2000000
  rollout_length: 256
  num_envs: 1
  gamma: 0.99
  gae_lambda: 0.95
  clip_ratio: 0.2
  entropy_coef: 0.008
  value_coef: 0.5
  learning_rate: 0.0003
  min_learning_rate: 0.00003
  batch_size: 2048
  epochs: 6
  max_grad_norm: 0.5
  value_clip: 0.2
  reward_normalization: true
  observation_normalization: true
  lr_schedule: true
model:
  hidden_dim: 128
  activation: tanh
logging:
  log_dir: experiments/results/ablations/A2_mappo_dense_reward
env:
  name: counter_uav_2d
  seed: 42
  world_size: 1000.0
  num_defenders: 5
  num_intruders: 5
  max_steps: 500
  protected_asset_position: [500.0, 500.0]
  protected_radius: 80.0
  intercept_radius: 20.0
  defender_max_speed: 12.0
  intruder_max_speed: 8.0
  dt: 1.0
  nearest_intruders: 4
  nearest_teammates: 3
  communication_radius: 250.0
  collision_radius: 5.0
  separation_radius: 25.0
  defender_acceleration_scale: 4.0
  intruder_behavior: straight_attack
  initial_energy: 100.0
  energy_cost: 0.05
  action:
    type: continuous_acceleration
    range: [-1.0, 1.0]
  reward:
    intercept: 12.0
    high_threat_intercept: 6.0
    breach: -30.0
    collision: -4.0
    step: -0.005
    threat_scale: 0.08
    dense_intercept_scale: 3.0
    asset_risk_penalty: 1.0
    collision_proximity_penalty: 1.5
    action_smoothness_penalty: 0.05
    action_magnitude_penalty: 0.008
