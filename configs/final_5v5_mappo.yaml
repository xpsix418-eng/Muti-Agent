scenario: Scenario5v5
algorithm: MAPPO
extends: configs/final_5v5_ipg_mappo.yaml
method:
  use_dense_reward: false
  use_predictive_reward: false
  use_soft_assignment: false
  use_graph_encoder: false
  graph_type: none
  use_interception_point_nodes: false
  use_ita_edge_feature: false
  use_assignment_gate: false
  use_assignment_auxiliary_loss: false
logging:
  log_dir: experiments/results/final_5v5/mappo
env:
  assignment_weight_start: 0.0
  assignment_weight_end: 0.0
  reward:
    intercept: 50.0
    high_threat_intercept: 0.0
    approach: 0.0
    intercept_point_approach: 0.0
    blocking_position: 0.0
    ttc_advantage: 0.0
    intruder_progress_penalty: 0.0
    breach: -40.0
    collision: -5.0
    collision_avoidance: 0.0
    action_magnitude_penalty: 0.02
    step: -0.005
    duplicate_assignment: 0.0
    assignment_guidance: 0.0
    threat_scale: 0.0
