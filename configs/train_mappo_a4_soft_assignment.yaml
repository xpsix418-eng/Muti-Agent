scenario: Scenario5v5
training:
  seed: 42
  total_steps: 2000000
  rollout_length: 256
  num_envs: 1
  gamma: 0.99
  gae_lambda: 0.95
  clip_ratio: 0.2
  entropy_coef: 0.008
  value_coef: 0.5
  learning_rate: 0.0003
  min_learning_rate: 0.00003
  batch_size: 2048
  epochs: 6
  max_grad_norm: 0.5
  value_clip: 0.2
  reward_normalization: true
  observation_normalization: true
  lr_schedule: true
model:
  hidden_dim: 128
  activation: tanh
logging:
  log_dir: experiments/results/ablations/A4_soft_assignment
env:
  name: counter_uav_2d
  seed: 42
  world_size: 1000.0
  num_defenders: 5
  num_intruders: 5
  max_steps: 500
  protected_asset_position: [500.0, 500.0]
  protected_radius: 80.0
  intercept_radius: 20.0
  defender_max_speed: 12.0
  intruder_max_speed: 8.0
  dt: 1.0
  nearest_intruders: 4
  nearest_teammates: 3
  communication_radius: 250.0
  collision_radius: 5.0
  separation_radius: 25.0
  prediction_horizon_mode: dynamic
  min_tau: 3.0
  max_tau: 10.0
  blocking_sigma: 35.0
  assignment_guidance_sigma: 120.0
  assignment_weight_start: 0.08
  assignment_weight_end: 0.0
  assignment_decay_steps: 1000000
  assignment_update_interval: 10
  defender_acceleration_scale: 4.0
  intruder_behavior: straight_attack
  initial_energy: 100.0
  energy_cost: 0.05
  action:
    type: continuous_acceleration
    range: [-1.0, 1.0]
  reward:
    intercept: 50.0
    high_threat_intercept: 20.0
    approach: 0.02
    intercept_point_approach: 0.15
    blocking_position: 0.20
    ttc_advantage: 0.10
    intruder_progress_penalty: 0.05
    breach: -40.0
    collision: -5.0
    collision_avoidance: 0.03
    energy: 0.02
    action_magnitude_penalty: 0.02
    time: 0.005
    step: -0.005
    duplicate_assignment: 0.0
    assignment_guidance: 1.0
    early_intercept_weight: 5.0
    intercept_time_margin_weight: 2.0
    threat_scale: 0.05
