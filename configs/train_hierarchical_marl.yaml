defaults:
  env_config: configs/env_2d.yaml
training:
  seed: 42
  total_steps: 100000
  option_horizon: 10
  high_level_interval: 10
  high_level_lr: 0.0003
  low_level_lr: 0.0003
hierarchy:
  cooperation_modes:
    - intercept
    - block
    - hold
    - regroup
  options:
    - guard_zone
    - pursue_nearest
    - spread_formation
logging:
  log_dir: experiments/results/hierarchical_marl
